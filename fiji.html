<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Strato - Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

body {
    margin:0;
    height:100vh;
    background-image:url("YOUR-BACKGROUND-IMAGE-LINK");
    background-size:cover;
    background-position:center;
    font-family:'Montserrat', sans-serif;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}


.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
}


.content{
    position:relative;
    z-index:2;
    padding:30px;
}


/* STRATO LOGO STYLE */

.logo{

    font-family:'Orbitron', sans-serif;
    font-size:90px;
    letter-spacing:12px;
    font-weight:700;
    text-transform:uppercase;

    background:linear-gradient(
    90deg,
    #ffffff,
    #bfe9ff
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    text-shadow:
    0 0 20px rgba(255,255,255,0.35);

}


/* COMING SOON TEXT */

.coming{

    margin-top:25px;
    font-size:42px;
    font-weight:600;
    letter-spacing:5px;
    font-family:'Montserrat',sans-serif;

}


.location{

    margin-top:15px;
    font-size:22px;
    font-weight:300;
    letter-spacing:3px;

}


.description{

    max-width:650px;
    margin:30px auto;
    font-size:18px;
    line-height:1.7;
    font-weight:300;

}



@media(max-width:768px){

.logo{
font-size:55px;
letter-spacing:7px;
}


.coming{
font-size:28px;
}


.location{
font-size:16px;
}


.description{
font-size:15px;
}

}

</style>

</head>


<body>


<div class="overlay"></div>


<div class="content">


<div class="logo">
STRATO
</div>


<div class="coming">
COMING SOON
</div>


<div class="location">
TO FIJI
</div>


<div class="description">

Tropical-ready air conditioning designed for Fiji homes, offices, hotels, and commercial spaces.

</div>


</div>


</body>
</html>
